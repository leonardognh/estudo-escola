<section class="space-y-4">
  <p-confirmdialog />
  <app-page-header [title]="labels.title" actionLabel="Nova materia" (action)="openCreateModal()" />

  @if (facade.loading()) {
    <p class="text-sm text-muted-color">Carregando...</p>
  } @else {
    <p-table
      #dtMaterias
      [value]="facade.materias()"
      [paginator]="true"
      [rows]="8"
      [globalFilterFields]="['nome', 'codigo']"
      responsiveLayout="scroll"
    >
      <ng-template pTemplate="caption">
        <app-table-search placeholder="Pesquisar materia" (searchChange)="dtMaterias.filterGlobal($event, 'contains')" />
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Codigo</th>
          <th class="w-36">Acoes</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-materia>
        <tr>
          <td>{{ materia.nome }}</td>
          <td>{{ materia.codigo }}</td>
          <td>
            <div class="flex gap-2">
              <button pButton type="button" severity="secondary" (click)="startEdit(materia)">
                {{ labels.edit }}
              </button>
              <button pButton type="button" severity="danger" (click)="remove(materia.id)">
                {{ labels.remove }}
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  }

  <p-dialog
    [visible]="modalVisible()"
    [modal]="true"
    [closable]="true"
    [style]="{ width: '42rem', 'max-width': '95vw' }"
    [header]="editingMateriaId() ? 'Editar materia' : 'Nova materia'"
    (onHide)="cancelMateriaEdit()"
  >
    <form [formGroup]="form" (ngSubmit)="submit()" class="grid gap-4">
      <label class="flex flex-col gap-1 text-sm">
        Nome
        <input pInputText type="text" formControlName="nome" />
        @if (form.controls.nome.touched && form.controls.nome.invalid) {
          <small class="text-red-600">Nome deve ter ao menos 3 caracteres.</small>
        }
      </label>

      <label class="flex flex-col gap-1 text-sm">
        Codigo
        <input pInputText type="text" formControlName="codigo" />
        @if (form.controls.codigo.touched && form.controls.codigo.invalid) {
          <small class="text-red-600">Codigo e obrigatorio.</small>
        }
      </label>

      <app-form-actions
        [loading]="facade.loading()"
        [saveLabel]="labels.save"
        [cancelLabel]="labels.cancel"
        (cancel)="cancelMateriaEdit()"
      />
    </form>
  </p-dialog>
</section>
