<section class="space-y-4">
  <app-page-header titleKey="settings.pageTitle" />

  <p-card styleClass="app-panel-border">
    <div class="mb-3">
      <h2 class="text-lg font-semibold text-color">{{ 'settings.languageTitle' | transloco }}</h2>
      <p class="mt-1 text-sm text-muted-color">
        {{ 'settings.languageHint' | transloco }}
      </p>
    </div>
    <app-language-switcher />
  </p-card>

  <p-card>
    <form [formGroup]="form" (ngSubmit)="submit()" class="grid grid-cols-1 gap-4 sm:grid-cols-2">
      <label class="flex flex-col gap-1 text-sm sm:col-span-2">
        {{ 'settings.field.nomeEscola' | transloco }}
        <input pInputText type="text" formControlName="nomeEscola" />
      </label>
      <label class="flex flex-col gap-1 text-sm">
        {{ 'settings.field.periodizacao' | transloco }}
        <p-select
          formControlName="periodizacaoNotas"
          [options]="periodizacaoOptions"
          optionLabel="label"
          optionValue="value"
          [fluid]="true"
          appendTo="body"
        />
      </label>
      <label class="flex flex-col gap-1 text-sm">
        {{ 'settings.field.notaMaxima' | transloco }}
        <input pInputText type="number" min="1" step="0.1" formControlName="notaMaxima" />
      </label>
      <label class="flex flex-col gap-1 text-sm">
        {{ 'settings.field.mediaAprovacao' | transloco }}
        <input pInputText type="number" min="0" step="0.1" formControlName="mediaAprovacao" />
      </label>
      <label class="flex flex-col gap-1 text-sm">
        {{ 'settings.field.recuperacao' | transloco }}
        <p-select
          formControlName="usaRecuperacao"
          [options]="simNaoOptions()"
          optionLabel="label"
          optionValue="value"
          [fluid]="true"
          appendTo="body"
        />
      </label>
      <label class="flex flex-col gap-1 text-sm">
        {{ 'settings.field.lancamentoManual' | transloco }}
        <p-select
          formControlName="permiteLancamentoManual"
          [options]="simNaoOptions()"
          optionLabel="label"
          optionValue="value"
          [fluid]="true"
          appendTo="body"
        />
      </label>
      <label class="flex flex-col gap-1 text-sm">
        {{ 'settings.field.ranking' | transloco }}
        <p-select
          formControlName="mostrarRankingTurma"
          [options]="simNaoOptions()"
          optionLabel="label"
          optionValue="value"
          [fluid]="true"
          appendTo="body"
        />
      </label>

      <div class="sm:col-span-2">
        <app-form-actions [loading]="facade.loading()" [showCancel]="false" />
      </div>
    </form>
  </p-card>
</section>
