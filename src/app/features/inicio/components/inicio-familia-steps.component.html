<div class="grid gap-4">
  @for (step of steps; track step.title) {
    <p-card>
      <h3 class="text-lg font-semibold text-color">{{ step.title }}</h3>
      <p class="mt-2 text-sm text-muted-color">{{ step.description }}</p>
      @if (step.links.length) {
        <div class="mt-4 flex flex-wrap gap-2">
          @for (link of step.links; track link.path) {
            <a pButton [routerLink]="link.path" severity="contrast" variant="outlined">{{ link.label }}</a>
          }
        </div>
      }
    </p-card>
  }
</div>
