<section class="space-y-4">
  <p-confirmdialog />
  <app-page-header [title]="labels.title" actionLabel="Novo aluno" (action)="openCreateModal()" />

  @if (facade.loading()) {
    <p class="text-sm text-muted-color">Carregando...</p>
  } @else {
    <p-table
      #dtAlunos
      [value]="facade.alunos()"
      [paginator]="true"
      [rows]="8"
      [globalFilterFields]="['nome', 'email']"
      responsiveLayout="scroll"
    >
      <ng-template pTemplate="caption">
        <app-table-search placeholder="Pesquisar aluno" (searchChange)="dtAlunos.filterGlobal($event, 'contains')" />
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Email</th>
          <th class="w-36">Acoes</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-aluno>
        <tr>
          <td>{{ aluno.nome }}</td>
          <td>{{ aluno.email }}</td>
          <td>
            <div class="flex gap-2">
              <button pButton type="button" severity="secondary" (click)="startEdit(aluno)">
                {{ labels.edit }}
              </button>
              <button pButton type="button" severity="danger" (click)="remove(aluno.id)">
                {{ labels.remove }}
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  }

  <p-dialog
    [visible]="modalVisible()"
    [modal]="true"
    [closable]="true"
    [style]="{ width: '42rem', 'max-width': '95vw' }"
    [header]="editingId() ? 'Editar aluno' : 'Novo aluno'"
    (onHide)="cancelEdit()"
  >
    <form [formGroup]="form" (ngSubmit)="submit()" class="grid gap-4">
      <label class="flex flex-col gap-1 text-sm">
        Nome
        <input pInputText type="text" formControlName="nome" />
        @if (form.controls.nome.touched && form.controls.nome.invalid) {
          <small class="text-red-600">Nome deve ter ao menos 3 caracteres.</small>
        }
      </label>

      <label class="flex flex-col gap-1 text-sm">
        Email
        <input pInputText type="email" formControlName="email" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="text-red-600">Informe um e-mail valido.</small>
        }
      </label>

      <app-form-actions
        [loading]="facade.loading()"
        [saveLabel]="labels.save"
        [cancelLabel]="labels.cancel"
        (cancel)="cancelEdit()"
      />
    </form>
  </p-dialog>
</section>
