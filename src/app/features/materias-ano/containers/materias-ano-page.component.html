<section class="space-y-4">
  <p-confirmdialog />
  <app-page-header
    [title]="labels.title"
    actionLabel="Nova atribuicao por ano"
    (action)="openCreateModal()"
  />

  <p-table
    #dtMateriaAno
    [value]="groupedRows()"
    [paginator]="true"
    [rows]="10"
    [globalFilterFields]="['ano', 'materias']"
    responsiveLayout="scroll"
  >
    <ng-template pTemplate="caption">
      <app-table-search
        placeholder="Pesquisar atribuicao"
        (searchChange)="dtMateriaAno.filterGlobal($event, 'contains')"
      />
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th>Ano</th>
        <th>Materias</th>
        <th class="w-36">Acoes</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.ano }}</td>
        <td>{{ row.materias }}</td>
        <td>
          <div class="flex gap-2">
            <button pButton type="button" severity="secondary" (click)="openEditModal(row.ano)">Editar</button>
            <button pButton type="button" severity="danger" (click)="confirmRemoveAno(row.ano)">Remover</button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog
    [visible]="modalVisible()"
    [modal]="true"
    [closable]="true"
    [style]="{ width: '72rem', 'max-width': '98vw' }"
    [contentStyle]="{ overflow: 'visible' }"
    [header]="editingAno() ? 'Editar atribuicoes do ano' : 'Nova atribuicao por ano'"
    (onHide)="closeModal()"
  >
    <form [formGroup]="anoForm" (ngSubmit)="submitAnoMateria()" class="space-y-4">
      <label class="flex flex-col gap-1 text-sm md:max-w-xs">
        Ano
        <p-select formControlName="ano" [options]="anoOptions" optionLabel="label" optionValue="value" [fluid]="true" />
      </label>

      <div class="min-h-72">
      <p-table
        [value]="anoMateriaItens.controls"
        responsiveLayout="scroll"
        [tableStyle]="{ 'min-width': '980px' }"
      >
        <ng-template pTemplate="header">
          <tr>
            <th>Materia</th>
            <th>Carga horaria</th>
            <th>Professor principal</th>
            <th>Professor substituto</th>
            <th class="w-28">Acoes</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item let-i="rowIndex">
          <tr [formGroup]="item">
            <td>
              <p-select
                formControlName="materiaId"
                [options]="facade.materiaOptions()"
                optionLabel="label"
                optionValue="value"
                [filter]="true"
                [fluid]="true"
                appendTo="body"
              />
            </td>
            <td>
              <input pInputText type="number" formControlName="cargaHoraria" />
            </td>
            <td>
              <p-select
                formControlName="professorPrincipalId"
                [options]="getProfessoresOptionsByMateria(item.value.materiaId)"
                optionLabel="label"
                optionValue="value"
                [filter]="true"
                [fluid]="true"
                appendTo="body"
              />
            </td>
            <td>
              <p-select
                formControlName="professorSubstitutoId"
                [options]="getProfessoresOptionsByMateria(item.value.materiaId)"
                optionLabel="label"
                optionValue="value"
                [filter]="true"
                [showClear]="true"
                [fluid]="true"
                appendTo="body"
              />
            </td>
            <td>
              <button
                pButton
                type="button"
                severity="danger"
                [outlined]="true"
                (click)="removeAnoMateriaItem(i)"
                [disabled]="anoMateriaItens.length === 1"
              >
                Remover
              </button>
            </td>
          </tr>
        </ng-template>
      </p-table>
      </div>

      <div class="flex flex-wrap justify-end gap-2">
        <button pButton type="button" severity="secondary" [outlined]="true" (click)="addAnoMateriaItem()">
          Adicionar materia
        </button>
        <app-form-actions
          [loading]="facade.loading() || !facade.materias().length"
          [saveLabel]="labels.save"
          [cancelLabel]="labels.cancel"
          (cancel)="closeModal()"
        />
      </div>

      @if (formError()) {
        <p class="text-sm text-red-600">{{ formError() }}</p>
      }
    </form>
  </p-dialog>
</section>
