<section class="mx-auto mt-10 w-full max-w-md">
  <p-card>
    <h2 class="mb-4 text-2xl font-semibold text-color">{{ 'auth.title' | transloco }}</h2>
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <label class="flex flex-col gap-1 text-sm">
        {{ 'auth.email' | transloco }}
        <input
          pInputText
          type="email"
          formControlName="email"
          [attr.placeholder]="'auth.placeholderEmail' | transloco"
        />
      </label>

      <label class="flex flex-col gap-1 text-sm">
        {{ 'auth.password' | transloco }}
        <input
          pInputText
          type="password"
          formControlName="senha"
          [attr.placeholder]="'auth.placeholderPassword' | transloco"
        />
      </label>

      <label class="flex items-center gap-2 text-sm">
        <input type="checkbox" formControlName="lembrarMe" />
        {{ 'auth.remember' | transloco }}
      </label>

      <button pButton type="submit" class="w-full">{{ 'auth.submit' | transloco }}</button>
    </form>
  </p-card>
</section>
