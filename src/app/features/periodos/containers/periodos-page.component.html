<section class="space-y-4">
  <p-confirmdialog />
  <app-page-header titleKey="periodos.pageTitle" actionLabelKey="periodos.newAction" (action)="openCreateModal()" />

  <p-card>
    <h3 class="mb-3 text-lg font-medium">{{ 'periodos.section.list' | transloco }}</h3>
    <p-table
      #dtPeriodos
      [value]="facade.periodos()"
      [paginator]="true"
      [rows]="8"
      [globalFilterFields]="['nome', 'horaInicio', 'horaFim']"
      responsiveLayout="scroll"
    >
      <ng-template pTemplate="caption">
        <app-table-search
          placeholderKey="periodos.searchPlaceholder"
          (searchChange)="dtPeriodos.filterGlobal($event, 'contains')"
        />
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th>{{ 'periodos.field.nome' | transloco }}</th>
          <th>{{ 'periodos.field.inicio' | transloco }}</th>
          <th>{{ 'periodos.field.fim' | transloco }}</th>
          <th class="w-24 sm:w-32">{{ 'alunos.col.actions' | transloco }}</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-periodo>
        <tr>
          <td>{{ periodo.nome }}</td>
          <td>{{ periodo.horaInicio }}</td>
          <td>{{ periodo.horaFim }}</td>
          <td>
            <div class="flex flex-wrap items-center gap-1 sm:gap-2">
              <p-button
                icon="pi pi-pencil"
                [rounded]="true"
                [text]="true"
                severity="secondary"
                size="small"
                [pTooltip]="'common.edit' | transloco"
                tooltipPosition="top"
                (onClick)="startEdit(periodo)"
              />
              <p-button
                icon="pi pi-trash"
                [rounded]="true"
                [text]="true"
                severity="danger"
                size="small"
                [pTooltip]="'common.remove' | transloco"
                tooltipPosition="top"
                (onClick)="remove(periodo.id)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>

  <p-dialog
    [visible]="modalVisible()"
    [modal]="true"
    [closable]="true"
    [style]="{ width: '40rem', 'max-width': '95vw' }"
    [header]="(editingId() ? 'periodos.dialog.edit' : 'periodos.dialog.new') | transloco"
    (onHide)="cancelEdit()"
  >
    <form [formGroup]="form" (ngSubmit)="submit()" class="grid grid-cols-1 gap-3 sm:grid-cols-2">
      <label class="flex flex-col gap-1 text-sm">
        {{ 'periodos.field.nome' | transloco }}
        <input
          pInputText
          type="text"
          formControlName="nome"
          [placeholder]="'periodos.field.nomePlaceholder' | transloco"
        />
        @if (form.controls.nome.touched && form.controls.nome.invalid) {
          <small class="text-red-600">{{ 'periodos.validation.nome' | transloco }}</small>
        }
      </label>

      <label class="flex flex-col gap-1 text-sm">
        {{ 'periodos.field.inicio' | transloco }}
        <input pInputText type="time" formControlName="horaInicio" />
      </label>

      <label class="flex flex-col gap-1 text-sm">
        {{ 'periodos.field.fim' | transloco }}
        <input pInputText type="time" formControlName="horaFim" />
      </label>

      <div class="sm:col-span-2">
        <app-form-actions [loading]="facade.loading()" (cancel)="cancelEdit()" />
      </div>
    </form>
  </p-dialog>
</section>
